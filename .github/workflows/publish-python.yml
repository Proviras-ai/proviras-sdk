name: Publish (Python)

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Verify versions match tag
        working-directory: .
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          NPM_VERSION=$(awk -F'"' '/"version":/{print $4; exit}' package.json)
          PY_VERSION=$(awk -F'"' '/^version *= *"/{print $2; exit}' python/pyproject.toml)
          echo "Tag: $TAG | package.json: $NPM_VERSION | pyproject.toml: $PY_VERSION"
          fail=0
          if [ "$TAG" != "$NPM_VERSION" ]; then
            echo "::error::package.json version ($NPM_VERSION) does not match tag (v$TAG)"
            fail=1
          fi
          if [ "$TAG" != "$PY_VERSION" ]; then
            echo "::error::python/pyproject.toml version ($PY_VERSION) does not match tag (v$TAG)"
            fail=1
          fi
          exit $fail

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --upgrade build twine
      - run: python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
